name: jinlian_reminder
description: "金莲提醒 - 药物提醒应用"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 本地数据库
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # 本地通知
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0

  # 日期格式化
  intl: ^0.20.2

  # 文件路径
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Isar 代码生成
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true